name: Deploy to IPFS

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'scripts/publish-from-local.sh'
  workflow_dispatch:

concurrency:
  group: deploy-ipfs
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify static site root
        run: test -f index.html

      - name: Prepare deploy bundle
        run: |
          mkdir -p deploy
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='scripts/' \
            --exclude='deploy/' \
            --exclude='README.md' \
            --exclude='LICENSE' \
            --exclude='.gitignore' \
            ./ deploy/
          echo "Files to upload: $(find deploy -type f | wc -l)"

      - name: Pin to Pinata
        id: pin
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_API_SECRET: ${{ secrets.PINATA_API_SECRET }}
          PIN_NAME: aorb.info
          MAX_PINS_TO_KEEP: '3'
        run: node .github/scripts/pin-site.mjs deploy

      - name: Update Cloudflare Web3 DNSLink
        id: dnslink
        env:
          CID: ${{ steps.pin.outputs.cid }}
          CF_ZONE_ID: ${{ secrets.CF_ZONE_ID }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_WEB3_HOSTNAME: ${{ vars.CF_WEB3_HOSTNAME }}
          CF_WEB3_HOSTNAME_ID: ${{ secrets.CF_WEB3_HOSTNAME_ID }}
        run: |
          set -euo pipefail

          DNSLINK="/ipfs/${CID}"
          CF_API="https://api.cloudflare.com/client/v4"
          GATEWAY_HOST="${CF_WEB3_HOSTNAME:-aorb.info}"

          echo "Updating Cloudflare Web3 gateway DNSLink for ${GATEWAY_HOST} -> ${DNSLINK}"

          if [ -n "${CF_WEB3_HOSTNAME_ID:-}" ]; then
            HOSTNAME_ID="${CF_WEB3_HOSTNAME_ID}"
            echo "Using CF_WEB3_HOSTNAME_ID: ${HOSTNAME_ID}"
          else
            LIST=$(curl -sS "${CF_API}/zones/${CF_ZONE_ID}/web3/hostnames" \
              -H "Authorization: Bearer ${CF_API_TOKEN}" \
              -H "Content-Type: application/json")

            if [ "$(echo "$LIST" | jq -r '.success')" != "true" ]; then
              echo "Cloudflare Web3 list error:"
              echo "$LIST" | jq .
              echo ""
              echo "Add Web3 Hostnames Edit to CF_API_TOKEN, or set CF_WEB3_HOSTNAME_ID."
              exit 1
            fi

            HOSTNAME_ID=$(echo "$LIST" | jq -r --arg name "$GATEWAY_HOST" '.result[] | select(.name == $name) | .id' | head -1)

            if [ -z "$HOSTNAME_ID" ] || [ "$HOSTNAME_ID" = "null" ]; then
              echo "No Web3 gateway found for hostname ${GATEWAY_HOST}."
              echo "Available gateways:"
              echo "$LIST" | jq '.result[] | {id, name, target, dnslink, status}'
              exit 1
            fi
          fi

          PAYLOAD=$(jq -n --arg dnslink "$DNSLINK" '{dnslink: $dnslink}')

          RESULT=$(curl -sS -w "\nHTTP_STATUS:%{http_code}\n" -X PATCH \
            "${CF_API}/zones/${CF_ZONE_ID}/web3/hostnames/${HOSTNAME_ID}" \
            -H "Authorization: Bearer ${CF_API_TOKEN}" \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD")

          HTTP_STATUS=$(echo "$RESULT" | tail -1 | cut -d: -f2)
          BODY=$(echo "$RESULT" | sed '$d')

          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Cloudflare Web3 API failed (HTTP ${HTTP_STATUS}):"
            echo "$BODY" | jq . 2>/dev/null || echo "$BODY"
            echo ""
            echo "Token needs Zone -> Web3 Hostnames -> Edit on ${GATEWAY_HOST}."
            exit 1
          fi

          if [ "$(echo "$BODY" | jq -r '.success')" != "true" ]; then
            echo "Cloudflare Web3 API returned success=false:"
            echo "$BODY" | jq .
            exit 1
          fi

          echo "Web3 DNSLink updated successfully."
          echo "$BODY" | jq -r '.result | {id, name, dnslink, status, modified_on}'

      - name: Summary
        run: |
          echo "### Deployed to IPFS" >> "$GITHUB_STEP_SUMMARY"
          echo "- **CID:** \`${{ steps.pin.outputs.cid }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Gateway:** https://gateway.pinata.cloud/ipfs/${{ steps.pin.outputs.cid }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **DNSLink:** _dnslink.aorb.info → dnslink=/ipfs/${{ steps.pin.outputs.cid }}" >> "$GITHUB_STEP_SUMMARY"
