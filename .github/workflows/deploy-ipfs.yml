name: Deploy to IPFS

on:
  push:
    branches:
      - master
      - main
    paths-ignore:
      - 'README.md'
      - 'LICENSE'
      - 'scripts/publish-from-local.sh'
  workflow_dispatch:

concurrency:
  group: deploy-ipfs
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify static site root
        run: test -f index.html

      - name: Prepare deploy bundle
        run: |
          mkdir -p deploy
          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='scripts/' \
            --exclude='deploy/' \
            --exclude='README.md' \
            --exclude='LICENSE' \
            --exclude='.gitignore' \
            ./ deploy/
          echo "Files to upload: $(find deploy -type f | wc -l)"

      - name: Pin to Pinata
        id: pin
        working-directory: .github/scripts
        env:
          PINATA_JWT: ${{ secrets.PINATA_JWT }}
          PINATA_API_KEY: ${{ secrets.PINATA_API_KEY }}
          PINATA_API_SECRET: ${{ secrets.PINATA_API_SECRET }}
          PIN_NAME: aorb.info
        run: |
          npm ci
          node pin-site.mjs ../../deploy

      - name: Update Cloudflare DNSLink
        uses: ipshipyard/dnslink-action@v1
        with:
          cid: ${{ steps.pin.outputs.cid }}
          dnslink_domain: aorb.info
          cf_zone_id: ${{ secrets.CF_ZONE_ID }}
          cf_auth_token: ${{ secrets.CF_API_TOKEN }}
          set_github_status: true
          github_token: ${{ github.token }}

      - name: Summary
        run: |
          echo "### Deployed to IPFS" >> "$GITHUB_STEP_SUMMARY"
          echo "- **CID:** \`${{ steps.pin.outputs.cid }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Gateway:** https://gateway.pinata.cloud/ipfs/${{ steps.pin.outputs.cid }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **DNSLink:** _dnslink.aorb.info → dnslink=/ipfs/${{ steps.pin.outputs.cid }}" >> "$GITHUB_STEP_SUMMARY"
